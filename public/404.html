<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // Redirect to the main app, preserving the path as a query param
    // so the SPA router can handle it
    const path = window.location.pathname;
    window.location.replace('/parametric-diagrams/?route=' + encodeURIComponent(path));
  </script>
</head>
